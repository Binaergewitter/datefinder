{% extends "account/base.html" %}

{% block title %}Sign In - Podcast Date Finder{% endblock %}

{% block content %}
<hgroup>
    <h2>🎙️ Podcast Date Finder</h2>
    <p>Sign in with {{ provider.name }}</p>
</hgroup>

<p style="text-align: center;">
    You are about to sign in using your <strong>{{ provider.name }}</strong> account.
</p>

<form method="post" action="{% url 'socialaccount_login' %}?process={{ process }}">
    {% csrf_token %}
    <input type="hidden" name="provider" value="{{ provider.id }}">
    <button type="submit">🔐 Continue with {{ provider.name }}</button>
    <a href="{% url 'account_login' %}" role="button" class="secondary">Cancel</a>
</form>
{% endblock %}
