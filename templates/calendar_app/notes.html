{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Date Finder - Notes</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/notes.css' %}">
</head>
<body class="news-page">
    <div class="container">
        <header>
            <h1>🎙️ Podcast Date Finder</h1>
            <div class="header-actions">
                <a href="{% url 'calendar_app:calendar' %}" class="nav-pill">Calendar</a>
                <a href="{% url 'calendar_app:news' %}" class="nav-pill">RSS</a>
                <a href="{% url 'calendar_app:notes' %}" class="nav-pill active">Notes</a>
            </div>
            <div class="user-info">
                <span>Welcome, <strong>{{ user.get_full_name|default:user.username }}</strong></span>
                <a href="{% url 'account_logout' %}" class="logout-btn">Logout</a>
            </div>
        </header>

        <div class="notes-panel">
            <div class="notes-header">
                <h3>🗒️ Notes</h3>
            </div>
            <div class="notes-add">
                <textarea id="note-text" rows="4" placeholder="Add a quick note..."></textarea>
                <div class="notes-actions">
                    <button id="add-note">Add Note</button>
                </div>
            </div>
            <div class="notes-list" id="notes-list"></div>
        </div>
    </div>

    <script>
        const csrfToken = '{{ csrf_token }}';

        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
            document.getElementById('add-note').addEventListener('click', addNote);
        });

        async function loadNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = '<div class="notes-empty">Loading notes…</div>';
            try {
                const response = await fetch('/calendar/api/notes/');
                const data = await response.json();
                if (data.success) {
                    renderNotes(data.data);
                } else {
                    list.innerHTML = '<div class="notes-empty">Could not load notes.</div>';
                }
            } catch (error) {
                console.error('Error loading notes:', error);
                list.innerHTML = '<div class="notes-empty">Could not load notes.</div>';
            }
        }

        function renderNotes(notes) {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            if (!notes.length) {
                list.innerHTML = '<div class="notes-empty">No notes yet.</div>';
                return;
            }
            for (const note of notes) {
                const card = document.createElement('div');
                card.className = 'note-card';
                const createdAt = new Date(note.created_at);
                card.innerHTML = `
                    <div class="note-text">${escapeHtml(note.text)}</div>
                    <div class="note-meta">
                        <span>${createdAt.toLocaleString()}</span>
                        <button data-id="${note.id}" class="note-delete">Delete</button>
                    </div>
                `;
                card.querySelector('.note-delete').addEventListener('click', () => deleteNote(note.id));
                list.appendChild(card);
            }
        }

        async function addNote() {
            const textEl = document.getElementById('note-text');
            const text = textEl.value.trim();
            if (!text) {
                alert('Please enter a note.');
                return;
            }
            try {
                const response = await fetch('/calendar/api/notes/add/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                if (data.success) {
                    textEl.value = '';
                    loadNotes();
                } else {
                    alert(data.error || 'Could not add note.');
                }
            } catch (error) {
                console.error('Error adding note:', error);
            }
        }

        async function deleteNote(noteId) {
            if (!confirm('Delete this note?')) return;
            try {
                const response = await fetch(`/calendar/api/notes/${noteId}/delete/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken,
                        'Content-Type': 'application/json',
                    },
                });
                const data = await response.json();
                if (data.success) {
                    loadNotes();
                }
            } catch (error) {
                console.error('Error deleting note:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
